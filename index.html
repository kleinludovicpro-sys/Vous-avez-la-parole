<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Évaluation Français 6e – Module complet (textes personnalisés)</title>
  <style>
    :root{
      --bg:#0f1115; --card:#ffffffef; --ink:#111; --muted:#555;
      --accent:#0088ce; --good:#1a7f37; --bad:#b42318; --line:#0000001a;
      --chip:#e9f4ff; --chipb:#bfe3fb;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:linear-gradient(180deg,#0f1115,#141a28); color:#fff;
      padding:16px; display:flex; justify-content:center;
    }
    .wrap{width:min(1100px,100%);}
    header{display:flex; gap:12px; align-items:flex-start; justify-content:space-between; margin-bottom:12px}
    h1{margin:0; font-size:18px}
    .sub{margin:6px 0 0; color:#d7def0; font-size:13px; line-height:1.35}
    .pill{
      display:inline-flex; gap:8px; align-items:center;
      background:#0b1220; border:1px solid #26324c; color:#d7def0;
      padding:8px 10px; border-radius:999px; font-size:12px; white-space:nowrap;
    }
    .card{
      background:var(--card); color:var(--ink);
      border:1px solid var(--line); border-radius:16px; padding:14px;
      box-shadow:0 10px 30px #00000055;
    }
    .grid{display:grid; gap:12px}
    .two{grid-template-columns: 1.1fr .9fr}
    @media (max-width: 920px){ .two{grid-template-columns:1fr} }
    .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between}
    .btn{
      border:0; border-radius:12px; padding:10px 12px; cursor:pointer;
      background:var(--accent); color:#fff; font-weight:800;
    }
    .btn.secondary{background:#eef2f6; color:#111; border:1px solid var(--line)}
    .btn.ghost{background:transparent; border:1px dashed #9db5d9; color:#0b3550}
    .btn:disabled{opacity:.6; cursor:not-allowed}
    .chip{
      display:inline-flex; align-items:center; gap:8px;
      background:var(--chip); border:1px solid var(--chipb);
      color:#0b3550; padding:6px 10px; border-radius:999px; font-size:12px;
    }
    .hr{height:1px; background:var(--line); margin:10px 0}
    .kpi{display:grid; grid-template-columns: repeat(4,1fr); gap:10px}
    @media (max-width: 700px){ .kpi{grid-template-columns: repeat(2,1fr);} }
    .kpi .box{
      border:1px solid var(--line); border-radius:14px; padding:10px; background:#fff;
    }
    .kpi .v{font-size:18px; font-weight:900}
    .kpi .l{color:var(--muted); font-size:12px; margin-top:2px}
    .title2{font-weight:900; margin:0 0 6px}
    .muted{color:var(--muted)}
    textarea, input[type="text"], input[type="password"]{
      width:100%; padding:10px 12px; border-radius:12px; border:1px solid var(--line); font-size:14px;
      background:#fff;
    }
    textarea{min-height:120px; resize:vertical}
    select{
      width:100%; padding:10px 12px; border-radius:12px; border:1px solid var(--line); font-size:14px; background:#fff;
    }
    .task{
      border:1px solid var(--line); border-radius:14px; padding:12px; background:#fff;
    }
    .taskTop{display:flex; align-items:flex-start; justify-content:space-between; gap:10px}
    .taskName{font-weight:900}
    .badge{
      font-size:12px; padding:3px 8px; border-radius:999px;
      background:#f3f6ff; border:1px solid #d7e2ff; color:#102a43; white-space:nowrap;
    }
    .prompt{margin:10px 0; line-height:1.35}
    .opts{display:grid; gap:8px}
    label.opt{
      display:flex; gap:10px; align-items:flex-start;
      border:1px solid var(--line); border-radius:12px; padding:10px 12px; background:#fff; cursor:pointer;
    }
    label.opt:hover{border-color:#b9d7f0}
    input[type="radio"]{margin-top:3px}
    .feedback{
      margin-top:10px; padding:10px; border-radius:12px;
      border:1px solid var(--line); background:#fafbff;
    }
    .ok{border-color:#b7e3c2; background:#f0fff4}
    .ko{border-color:#f7c0bb; background:#fff3f2}
    .fbTitle{font-weight:900; margin:0 0 5px}
    .small{font-size:12px}
    .split{display:grid; grid-template-columns:1fr 1fr; gap:10px}
    @media (max-width: 800px){ .split{grid-template-columns:1fr} }
    .textBox{
      border:1px solid var(--line); border-radius:14px; padding:10px; background:#fff;
      max-height:320px; overflow:auto; line-height:1.5;
    }
    .word{
      display:inline-block; padding:1px 3px; border-radius:6px; margin:1px 0;
      cursor:pointer;
    }
    .word:hover{background:#eef6ff}
    .selected{background:#d9efff; outline:1px solid #86c5ff}
    .bank{
      border:1px solid var(--line); border-radius:14px; padding:10px; background:#fff;
      display:flex; gap:8px; flex-wrap:wrap; min-height:58px;
    }
    .piece{
      background:#f3f6ff; border:1px solid #d7e2ff; border-radius:999px;
      padding:7px 10px; cursor:grab; user-select:none; font-size:13px;
    }
    .zone{
      border:2px dashed #b9c7e6; border-radius:14px; padding:10px; background:#fbfcff; min-height:58px;
      display:flex; gap:8px; flex-wrap:wrap;
    }
    .kbd{
      font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:12px; padding:2px 6px; border-radius:8px; border:1px solid var(--line); background:#f6f8fa;
    }
    .list{
      border:1px solid var(--line); border-radius:14px; padding:10px; background:#fff;
      max-height:260px; overflow:auto;
    }
    .item{padding:8px 6px; border-bottom:1px solid var(--line)}
    .item:last-child{border-bottom:0}
    .tagGood{color:var(--good); font-weight:900}
    .tagBad{color:var(--bad); font-weight:900}
    details summary{cursor:pointer; font-weight:900; color:#0b3550}
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Évaluation Français 6e – Phrase & GN (module complet)</h1>
      <p class="sub">
        Tu peux <b>coller tes textes</b> (ceux des photos) en <span class="kbd">Mode Prof</span>, puis faire l’évaluation avec ton fils.
        Il y a du QCM, de la <b>recopie</b>, de la <b>reconstruction</b>, du <b>texte à trous</b>, du <b>repérage dans le texte</b> et de l’<b>écriture libre</b>.
      </p>
    </div>
    <div class="pill" id="pill">Mode élève</div>
  </header>

  <div class="grid two">
    <div class="card" id="main"></div>
    <div class="card" id="side"></div>
  </div>

  <div class="row" style="margin-top:12px">
    <button class="btn secondary" id="btnRestart">Recommencer</button>
    <button class="btn ghost" id="btnExport">Exporter le bilan (texte)</button>
    <button class="btn ghost" id="btnClear">Effacer sauvegarde</button>
  </div>
</div>

<script>
/* =========================================================
   0) DONNÉES – À PERSONNALISER EN MODE PROF
   ========================================================= */

/**
 * IMPORTANT :
 * - Tu colles tes textes (depuis les photos) dans "textes".
 * - Tu peux créer/éditer les exercices dans "exos".
 * - Tout est modifiable via le Mode Prof dans l'interface.
 */
const DEFAULT_DATA = {
  profCode: "64", // petit code simple pour éviter les clics accidentels
  textes: [
    {
      id:"T1",
      titre:"Texte 1",
      contenu:"COLLE ICI TON TEXTE 1 (depuis les photos)..."
    },
    {
      id:"T2",
      titre:"Texte 2",
      contenu:"COLLE ICI TON TEXTE 2..."
    }
  ],

  // Banque d'exercices (tu peux en ajouter autant que tu veux)
  exos: [
    // QCM
    {
      id:"E1",
      type:"mcq",
      niveau:"facile",
      titre:"Ponctuation",
      texteId:"T1",
      consigne:"Choisis la bonne réponse.",
      prompt:"Une phrase se termine généralement par…",
      options:["une virgule", "un point / ? / !", "des guillemets", "des parenthèses"],
      answerIndex:1,
      explain:"La ponctuation forte en fin de phrase : point, point d’interrogation, point d’exclamation."
    },

    // Trouver dans le texte (sélection)
    {
      id:"E2",
      type:"select_in_text",
      niveau:"moyen",
      titre:"Repérer un GN",
      texteId:"T1",
      consigne:"Dans le texte, clique exactement sur le groupe nominal demandé.",
      prompt:"Clique sur un groupe nominal (déterminant + nom) qui désigne un objet.",
      // ici on met des réponses attendues sous forme de chaînes normalisées (sans ponctuation superflue)
      expectedSelections:["le train","un crayon","la porte"],
      explain:"Un GN minimal = déterminant + nom. Si tu cliques 'le train', c'est un GN."
    },

    // Recopie (vérification automatique)
    {
      id:"E3",
      type:"copy",
      niveau:"moyen",
      titre:"Recopie sans erreur",
      texteId:"T1",
      consigne:"Recopie exactement la phrase ci-dessous.",
      prompt:"Recopie : « COLLE ICI UNE PHRASE DU TEXTE 1 »",
      expected:"COLLE ICI UNE PHRASE DU TEXTE 1",
      explain:"On vérifie : majuscules, accents, apostrophes, espaces et ponctuation."
    },

    // Reconstruction (drag & drop)
    {
      id:"E4",
      type:"rebuild",
      niveau:"moyen",
      titre:"Reconstituer la phrase",
      texteId:"T1",
      consigne:"Remets les morceaux dans l’ordre pour reconstruire la phrase.",
      pieces:["dans la forêt","Le petit loup","avance","silencieusement"],
      // phrase correcte attendue (normalisée)
      expected:"Le petit loup avance silencieusement dans la forêt",
      explain:"On cherche : sujet + verbe + compléments dans un ordre logique."
    },

    // Texte à trous
    {
      id:"E5",
      type:"cloze",
      niveau:"difficile",
      titre:"Expansions du nom",
      texteId:"T1",
      consigne:"Complète les trous avec les bons mots.",
      prompt:"Complète : « Le ____ (nom) ____ (adjectif) de ____ (complément du nom) »",
      blanks:[
        {id:"b1", accept:[/chien/i,/loup/i,/garçon/i], hint:"un nom"},
        {id:"b2", accept:[/noir/i,/rapide/i,/grand/i], hint:"un adjectif"},
        {id:"b3", accept:[/la\s+nuit/i,/la\s+ville/i,/la\s+montagne/i], hint:"de + GN"}
      ],
      explain:"Expansions du nom : adjectif épithète, complément du nom (de + GN), relative."
    },

    // Écriture libre guidée
    {
      id:"E6",
      type:"free_write",
      niveau:"difficile",
      titre:"Écriture libre",
      texteId:"T2",
      consigne:"Écris 3 phrases correctes.",
      prompt:"Écris 3 phrases qui reprennent le thème du texte. Contraintes :\n- 1 phrase interrogative\n- 1 GN avec adjectif épithète\n- 1 GN avec complément du nom (de + GN)\n(Ex : 'la cabane mystérieuse' / 'la cabane de mon cousin')",
      rubric:{
        minSentences:3,
        mustHaveQuestion:true,
        mustHaveAdj:true,
        mustHaveDeGN:true,
        keywords:["cabane","forêt","mystérieux"], // facultatif : mots attendus (tu adaptes à tes textes)
      },
      explain:"On vérifie la variété des phrases et la présence d’expansions du nom."
    }
  ]
};

/* =========================================================
   1) OUTILS
   ========================================================= */
const LS_KEY = "fr6_module_data_v1";
const LS_PROGRESS = "fr6_module_progress_v1";

function deepClone(o){ return JSON.parse(JSON.stringify(o)); }
function normalize(s){
  return (s||"")
    .toLowerCase()
    .replace(/[’']/g,"'")
    .replace(/\s+/g," ")
    .trim()
    .replace(/[«»"]/g,"")
    .replace(/[.,;:!?]/g,"")
    .trim();
}
function nowISO(){ return new Date().toISOString(); }

function loadData(){
  const raw = localStorage.getItem(LS_KEY);
  if(!raw) return deepClone(DEFAULT_DATA);
  try{
    const parsed = JSON.parse(raw);
    // fallback sécurité
    return {
      profCode: parsed.profCode || DEFAULT_DATA.profCode,
      textes: Array.isArray(parsed.textes) ? parsed.textes : deepClone(DEFAULT_DATA.textes),
      exos: Array.isArray(parsed.exos) ? parsed.exos : deepClone(DEFAULT_DATA.exos),
    };
  } catch { return deepClone(DEFAULT_DATA); }
}
function saveData(data){ localStorage.setItem(LS_KEY, JSON.stringify(data)); }

function loadProgress(){
  const raw = localStorage.getItem(LS_PROGRESS);
  if(!raw) return { startedAt: nowISO(), idx:0, answers:{}, log:[] };
  try{
    const p = JSON.parse(raw);
    return {
      startedAt: p.startedAt || nowISO(),
      idx: Number.isFinite(p.idx) ? p.idx : 0,
      answers: p.answers || {},
      log: Array.isArray(p.log) ? p.log : []
    };
  } catch { return { startedAt: nowISO(), idx:0, answers:{}, log:[] }; }
}
function saveProgress(p){ localStorage.setItem(LS_PROGRESS, JSON.stringify(p)); }

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function countSentences(text){
  // approximatif pour 6e : on compte . ? !
  const m = (text||"").match(/[.!?]+/g);
  return m ? m.length : 0;
}
function hasQuestion(text){ return /\?/.test(text||""); }
function hasAdjLike(text){
  // heuristique simple: présence d'un adjectif après un nom fréquent / ou mot finissant en -e/-s/-x etc : pas fiable à 100%
  // En mode prof, tu peux plutôt évaluer à l'œil : on donne un indicateur.
  return /\b(une|un|des|le|la|les)\s+\w+\s+\w+/i.test(text||"");
}
function hasDeGN(text){
  return /\bde\s+(le|la|l'|les|mon|ma|mes|ton|ta|tes|son|sa|ses|notre|nos|votre|vos|leur|leurs|\w+)/i.test(text||"");
}
function includesKeywords(text, keywords){
  if(!keywords || !keywords.length) return true;
  const n = (text||"").toLowerCase();
  return keywords.some(k => n.includes((k||"").toLowerCase()));
}

/* =========================================================
   2) APP STATE
   ========================================================= */
let DATA = loadData();
let PROG = loadProgress();
let MODE = "eleve"; // eleve | prof
let ORDER = DATA.exos.map(e=>e.id); // ordre courant

function getExoById(id){ return DATA.exos.find(e=>e.id===id); }
function getTexteById(id){ return DATA.textes.find(t=>t.id===id); }
function currentExo(){ return getExoById(ORDER[PROG.idx]); }

function setPill(){
  const el = document.getElementById("pill");
  const total = ORDER.length;
  const done = Object.keys(PROG.answers||{}).length;
  el.textContent = (MODE==="prof" ? "Mode prof" : "Mode élève") + ` • ${done}/${total} répondu`;
}

/* =========================================================
   3) RENDER
   ========================================================= */
const main = document.getElementById("main");
const side = document.getElementById("side");

function render(){
  setPill();
  renderSide();
  if(MODE==="prof") renderProf();
  else renderEleve();
}

function renderSide(){
  const total = ORDER.length;
  const answered = Object.keys(PROG.answers||{}).length;
  const score = computeScore();
  const pct = total ? Math.round((score.points/score.maxPoints)*100) : 0;

  const exo = currentExo();
  const texte = exo ? getTexteById(exo.texteId) : null;

  side.innerHTML = `
    <div class="row">
      <div class="chip">Niveau : <b>6e</b></div>
      <div class="chip">Session : <b>${new Date(PROG.startedAt).toLocaleString()}</b></div>
    </div>
    <div class="hr"></div>
    <div class="kpi">
      <div class="box"><div class="v">${answered}/${total}</div><div class="l">Répondu</div></div>
      <div class="box"><div class="v">${score.points}/${score.maxPoints}</div><div class="l">Points</div></div>
      <div class="box"><div class="v">${pct}%</div><div class="l">Réussite</div></div>
      <div class="box"><div class="v">${PROG.idx+1}/${total}</div><div class="l">Exercice</div></div>
    </div>

    <div class="hr"></div>
    <p class="title2">Texte support</p>
    <p class="muted small">${texte ? (texte.titre + " (" + texte.id + ")") : "—"}</p>
    <div class="textBox" id="textBox">${texte ? escapeHTML(texte.contenu).replace(/\n/g,"<br>") : "Aucun texte sélectionné."}</div>

    <div class="hr"></div>
    <details>
      <summary>Bilan détaillé</summary>
      <div class="list" style="margin-top:10px">
        ${renderLog()}
      </div>
    </details>

    <div class="hr"></div>
    <div class="row">
      <button class="btn secondary" id="btnPrev" ${PROG.idx<=0?"disabled":""}>← Précédent</button>
      <button class="btn" id="btnNext" ${PROG.idx>=ORDER.length-1?"disabled":""}>Suivant →</button>
    </div>

    <div class="hr"></div>
    <div class="row">
      <button class="btn ghost" id="btnMode">${MODE==="prof"?"Passer en élève":"Mode prof"}</button>
    </div>
  `;

  // Nav
  const btnPrev = document.getElementById("btnPrev");
  const btnNext = document.getElementById("btnNext");
  btnPrev?.addEventListener("click", ()=>{ PROG.idx = Math.max(0, PROG.idx-1); saveProgress(PROG); render(); });
  btnNext?.addEventListener("click", ()=>{ PROG.idx = Math.min(ORDER.length-1, PROG.idx+1); saveProgress(PROG); render(); });

  // Mode
  document.getElementById("btnMode").addEventListener("click", ()=>{
    if(MODE==="prof"){ MODE="eleve"; render(); return; }
    // Demande code
    const code = prompt("Code prof ?");
    if(code === DATA.profCode){ MODE="prof"; render(); }
    else alert("Code incorrect.");
  });
}

function renderLog(){
  if(!PROG.log || !PROG.log.length) return `<div class="item muted">Pas encore de réponses.</div>`;
  return PROG.log.slice().reverse().map(entry=>{
    const tag = entry.ok ? `<span class="tagGood">OK</span>` : `<span class="tagBad">FAUX</span>`;
    return `<div class="item">
      ${tag} • <b>${escapeHTML(entry.titre||entry.id)}</b> <span class="muted">(${escapeHTML(entry.type)})</span>
      <div class="muted small">${escapeHTML(entry.detail||"")}</div>
    </div>`;
  }).join("");
}

function renderEleve(){
  const exo = currentExo();
  if(!exo){
    main.innerHTML = `<p class="title2">Aucun exercice.</p>`;
    return;
  }

  const already = PROG.answers[exo.id];
  const texte = getTexteById(exo.texteId);

  main.innerHTML = `
    <div class="task">
      <div class="taskTop">
        <div>
          <div class="taskName">${escapeHTML(exo.titre)} <span class="badge">${escapeHTML(exo.type)}</span></div>
          <div class="muted small">Niveau : ${escapeHTML(exo.niveau||"—")} • Exercice ID : ${exo.id}</div>
        </div>
        <div class="badge">${escapeHTML(exo.texteId || "—")}</div>
      </div>

      <div class="hr"></div>

      <div class="muted"><b>Consigne :</b> ${escapeHTML(exo.consigne||"")}</div>
      <div class="prompt">${escapeHTML(exo.prompt||"").replace(/\n/g,"<br>")}</div>

      <div id="taskBody"></div>

      <div class="row" style="margin-top:10px">
        <button class="btn" id="btnValidate">${already ? "Revalider" : "Valider"}</button>
        <button class="btn secondary" id="btnShowText">Afficher/masquer le texte</button>
      </div>

      <div id="fb"></div>
    </div>

    <div class="hr"></div>
    <p class="muted small">
      Astuce : on peut faire <b>ensemble</b>. Tu laisses ton fils répondre, puis vous lisez l’explication.
    </p>
  `;

  document.getElementById("btnShowText").addEventListener("click", ()=>{
    const box = document.getElementById("textBox");
    box.style.display = (box.style.display==="none" ? "block" : "none");
  });

  renderTaskBody(exo, texte);

  document.getElementById("btnValidate").addEventListener("click", ()=>{
    validate(exo);
  });

  // Si déjà répondu, affiche feedback
  if(already){
    showFeedback(already.ok, already.message, exo.explain);
  }
}

function renderTaskBody(exo, texte){
  const body = document.getElementById("taskBody");
  const saved = PROG.answers[exo.id]?.value;

  if(exo.type==="mcq"){
    body.innerHTML = `
      <div class="opts">
        ${exo.options.map((opt,i)=>`
          <label class="opt">
            <input type="radio" name="mcq" value="${i}" ${String(saved)===String(i)?"checked":""}/>
            <div>${escapeHTML(opt)}</div>
          </label>
        `).join("")}
      </div>
    `;
    return;
  }

  if(exo.type==="copy"){
    body.innerHTML = `
      <div class="inputWrap">
        <label class="muted small">Ta copie :</label>
        <textarea id="copyInput" placeholder="Recopie ici…">${saved?escapeHTML(saved):""}</textarea>
        <div class="muted small">On compare avec la phrase attendue (accents/ponctuation/espaces inclus).</div>
      </div>
    `;
    return;
  }

  if(exo.type==="rebuild"){
    const pieces = exo.pieces || [];
    // ordre initial : mélangé, mais stable si déjà répondu
    const initial = (saved && saved.bank && saved.zone) ? saved : null;
    const bankPieces = initial ? initial.bank : shuffle(pieces);
    const zonePieces = initial ? initial.zone : [];

    body.innerHTML = `
      <div class="split">
        <div>
          <p class="muted small"><b>Banque</b> (glisse vers la zone)</p>
          <div class="bank" id="bank"></div>
        </div>
        <div>
          <p class="muted small"><b>Zone</b> (mets dans l’ordre)</p>
          <div class="zone" id="zone"></div>
        </div>
      </div>
      <p class="muted small">Tu peux aussi cliquer une pastille pour la déplacer.</p>
    `;

    const bank = document.getElementById("bank");
    const zone = document.getElementById("zone");

    function makePiece(txt){
      const el = document.createElement("div");
      el.className = "piece";
      el.textContent = txt;
      el.draggable = true;

      el.addEventListener("dragstart", (e)=>{
        e.dataTransfer.setData("text/plain", txt);
        e.dataTransfer.effectAllowed = "move";
        el.dataset.dragging = "1";
      });
      el.addEventListener("dragend", ()=>{
        delete el.dataset.dragging;
      });
      el.addEventListener("click", ()=>{
        // clic = bascule banque<->zone
        if(el.parentElement.id==="bank"){ zone.appendChild(el); }
        else{ bank.appendChild(el); }
      });
      return el;
    }

    function allowDrop(container){
      container.addEventListener("dragover", (e)=>{ e.preventDefault(); });
      container.addEventListener("drop", (e)=>{
        e.preventDefault();
        const txt = e.dataTransfer.getData("text/plain");
        // trouve l'élément dragging
        const dragging = document.querySelector('.piece[data-dragging="1"]');
        if(dragging && dragging.textContent===txt){
          container.appendChild(dragging);
        }
      });
    }
    allowDrop(bank); allowDrop(zone);

    bankPieces.forEach(t=> bank.appendChild(makePiece(t)));
    zonePieces.forEach(t=> zone.appendChild(makePiece(t)));

    return;
  }

  if(exo.type==="cloze"){
    const blanks = exo.blanks || [];
    body.innerHTML = `
      <div class="inputWrap">
        ${(blanks).map((b,idx)=>`
          <div>
            <label class="muted small">Trou ${idx+1} <span class="muted">(${escapeHTML(b.hint||"")})</span></label>
            <input type="text" id="blank_${b.id}" placeholder="Réponse…" value="${saved?.[b.id]?escapeHTML(saved[b.id]):""}"/>
          </div>
        `).join("")}
      </div>
      <p class="muted small">Astuce : orthographe tolérée si proche (accents/apostrophes normalisés).</p>
    `;
    return;
  }

  if(exo.type==="select_in_text"){
    // On affiche le texte du côté droit, et on rend sélectionnable dans une copie ici (pour éviter de casser le panneau)
    const content = (texte?.contenu || "");
    const tokens = tokenizeForSelection(content);

    body.innerHTML = `
      <p class="muted small">Clique des mots dans ce texte (ici) pour sélectionner un groupe, puis valide.</p>
      <div class="textBox" id="selectBox"></div>
      <div class="row" style="margin-top:10px">
        <div class="chip">Sélection : <b id="selOut">—</b></div>
        <button class="btn secondary" id="btnClearSel">Effacer sélection</button>
      </div>
    `;

    const selectBox = document.getElementById("selectBox");
    const selOut = document.getElementById("selOut");
    let selectedIdx = new Set();

    function updateSel(){
      const words = [];
      [...selectedIdx].sort((a,b)=>a-b).forEach(i=>{
        const t = tokens[i]?.t || "";
        if(t.trim()) words.push(t);
      });
      const selText = words.join("");
      selOut.textContent = selText.trim() ? selText.trim() : "—";
      // save in DOM for validate
      selectBox.dataset.selection = selText.trim();
    }

    tokens.forEach((tok, i)=>{
      const span = document.createElement("span");
      span.className = "word";
      span.textContent = tok.t;
      if(tok.isSpace) span.style.cursor = "default";
      span.addEventListener("click", ()=>{
        if(tok.isSpace) return;
        if(selectedIdx.has(i)){ selectedIdx.delete(i); span.classList.remove("selected"); }
        else { selectedIdx.add(i); span.classList.add("selected"); }
        updateSel();
      });
      selectBox.appendChild(span);
    });

    document.getElementById("btnClearSel").addEventListener("click", ()=>{
      selectedIdx.clear();
      [...selectBox.querySelectorAll(".word")].forEach(w=>w.classList.remove("selected"));
      updateSel();
    });

    // restore saved
    if(saved){
      // on ne re-sélectionne pas mot par mot (complexe), mais on affiche
      selectBox.dataset.selection = saved;
      selOut.textContent = saved;
    } else updateSel();

    return;
  }

  if(exo.type==="free_write"){
    body.innerHTML = `
      <div class="inputWrap">
        <label class="muted small">Ta réponse (écriture libre) :</label>
        <textarea id="freeInput" placeholder="Écris ici…">${saved?escapeHTML(saved):""}</textarea>
        <div class="muted small">
          Indicateurs automatiques : nombre de phrases, présence de ?, présence de “de + GN”, etc.
          (Ça aide, mais toi tu peux corriger à l’œil.)
        </div>
      </div>
      <div class="kpi">
        <div class="box"><div class="v" id="m_sent">0</div><div class="l">Phrases</div></div>
        <div class="box"><div class="v" id="m_q">—</div><div class="l">Interrogative ?</div></div>
        <div class="box"><div class="v" id="m_de">—</div><div class="l">“de + GN”</div></div>
        <div class="box"><div class="v" id="m_kw">—</div><div class="l">Mots-clés</div></div>
      </div>
    `;

    const input = document.getElementById("freeInput");
    const rub = exo.rubric || {};
    function updateMetrics(){
      const t = input.value || "";
      document.getElementById("m_sent").textContent = countSentences(t);
      document.getElementById("m_q").textContent = hasQuestion(t) ? "Oui" : "Non";
      document.getElementById("m_de").textContent = hasDeGN(t) ? "Oui" : "Non";
      document.getElementById("m_kw").textContent = includesKeywords(t, rub.keywords||[]) ? "Oui" : "Non";
    }
    input.addEventListener("input", updateMetrics);
    updateMetrics();
    return;
  }

  body.innerHTML = `<p class="muted">Type d’exercice non reconnu : ${escapeHTML(exo.type)}</p>`;
}

function showFeedback(ok, message, explain){

      ${explain ? `<div class="hr"></div><p class="fbText"><b>Explication :</b> ${escapeHTML(explain)}</p>` : ""}
    </div>
  `;
}

/* =========================================================
   4) VALIDATION
   ========================================================= */
function validate(exo){
  let res = { ok:false, points:0, max:1, value:null, message:"" };

  if(exo.type==="mcq"){
    const checked = document.querySelector('input[name="mcq"]:checked');
    const v = checked ? Number(checked.value) : null;
    res.value = v;
    if(v===null){
      res.message = "Choisis une réponse.";
    } else if(v === exo.answerIndex){
      res.ok = true; res.points = 1;
      res.message = "Bonne réponse.";
    } else {
      res.message = `Mauvaise réponse.`;
    }
  }

  if(exo.type==="copy"){
    const inp = (document.getElementById("copyInput")?.value || "");
    res.value = inp;
    const expected = (exo.expected || "");
    // comparaison stricte (espaces normalisés)
    const a = inp.replace(/\s+/g," ").trim();
    const b = expected.replace(/\s+/g," ").trim();
    if(!a){
      res.message = "Recopie la phrase.";
    } else if(a === b){
      res.ok = true; res.points = 1;
      res.message = "Recopie parfaite.";
    } else {
      // donner un retour utile : compter différences basiques
      const diff = diffScore(a,b);
      res.message = `Il y a des différences (${diff} zone(s) différente(s)). Recompare les accents, apostrophes, espaces et la ponctuation.`;
    }
  }

  if(exo.type==="rebuild"){
    const bank = [...document.querySelectorAll("#bank .piece")].map(p=>p.textContent);
    const zone = [...document.querySelectorAll("#zone .piece")].map(p=>p.textContent);
    res.value = { bank, zone };
    const built = zone.join(" ").replace(/\s+/g," ").trim();
    const expected = (exo.expected||"").replace(/\s+/g," ").trim();
    if(zone.length === 0){
      res.message = "Glisse des morceaux dans la zone.";
    } else if(built === expected){
      res.ok = true; res.points = 1;
      res.message = "Phrase reconstruite correctement.";
    } else {
      res.message = "L’ordre n’est pas encore correct. Relis : sujet → verbe → compléments.";
    }
  }

  if(exo.type==="cloze"){
    const out = {};
    let okAll = true;
    for(const b of (exo.blanks||[])){
      const v = (document.getElementById(`blank_${b.id}`)?.value || "").trim();
      out[b.id] = v;
      const n = normalize(v);
      const accepts = (b.accept||[]).some(r => r.test(v) || r.test(n));
      if(!v || !accepts) okAll = false;
    }
    res.value = out;
    if(Object.values(out).every(v=>!v)){
      res.message = "Complète les trous.";
    } else if(okAll){
      res.ok = true; res.points = 1;
      res.message = "Tous les trous sont corrects.";
    } else {
      res.message = "Un ou plusieurs trous sont à corriger.";
    }
  }

  if(exo.type==="select_in_text"){
    const sel = document.getElementById("selectBox")?.dataset?.selection || "";
    res.value = sel;
    const nsel = normalize(sel);
    if(!sel || !sel.trim()){
      res.message = "Clique des mots pour faire une sélection.";
    } else {
      const ok = (exo.expectedSelections||[]).some(x => normalize(x) === nsel);
      if(ok){
        res.ok = true; res.points = 1;
        res.message = `Sélection acceptée : “${sel.trim()}”.`;
      } else {
        res.message = `Sélection non attendue : “${sel.trim()}”. Essaie un autre GN.`;
      }
    }
  }

  if(exo.type==="free_write"){
    const text = (document.getElementById("freeInput")?.value || "");
    res.value = text;
    const rub = exo.rubric || {};
    const sent = countSentences(text);
    const cond1 = sent >= (rub.minSentences || 1);
    const cond2 = !rub.mustHaveQuestion || hasQuestion(text);
    const cond3 = !rub.mustHaveAdj || hasAdjLike(text);
    const cond4 = !rub.mustHaveDeGN || hasDeGN(text);
    const cond5 = !rub.keywords || !rub.keywords.length || includesKeywords(text, rub.keywords);

    const ok = cond1 && cond2 && cond3 && cond4 && cond5;
    if(!text.trim()){
      res.message = "Écris ta réponse.";
    } else if(ok){
      res.ok = true; res.points = 1;
      res.message = "Les contraintes principales semblent respectées (à valider à l’œil).";
    } else {
      const misses = [];
      if(!cond1) misses.push(`au moins ${rub.minSentences||1} phrase(s)`);
      if(!cond2) misses.push("une phrase interrogative (?)");
      if(!cond4) misses.push("un 'de + GN' (complément du nom)");
      if(!cond5) misses.push("un mot-clé du thème");
      if(!cond3) misses.push("un GN avec adjectif (à vérifier)");
      res.message = "À améliorer : " + misses.join(", ") + ".";
    }
  }

  // Sauvegarde + log
  PROG.answers[exo.id] = {
    ok: res.ok,
    value: res.value,
    points: res.points,
    max: res.max,
    message: res.message
  };
  PROG.log.push({
    at: nowISO(),
    id: exo.id,
    titre: exo.titre,
    type: exo.type,
    ok: res.ok,
    detail: res.message
  });
  saveProgress(PROG);

  showFeedback(res.ok, res.message, exo.explain);
  renderSide();
}

function computeScore(){
  let points=0, maxPoints=0;
  for(const id of ORDER){
    const exo = getExoById(id);
    if(!exo) continue;
    maxPoints += 1;
    const a = PROG.answers[id];
    if(a && a.ok) points += 1;
  }
  return { points, maxPoints };
}

      // attention : exercices qui pointaient dessus

    });

      options:["A","B","C","D"], answerIndex:0, explain:"Explication…"
    });
    saveData(DATA);
    render();
  });

  // Save prof
  document.getElementById("saveProf").addEventListener("click", ()=>{

    DATA.textes.forEach(t=>{
      const title = document.querySelector(`[data-text-title="${CSS.escape(t.id)}"]`)?.value ?? t.titre;
      const content = document.querySelector(`[data-text-content="${CSS.escape(t.id)}"]`)?.value ?? t.contenu;
      t.titre = title;
      t.contenu = content;
    });

    // Exos updates (lecture des champs data-*)
    DATA.exos.forEach(e=>{
      const get = (k)=> document.querySelector(`[data-exo="${CSS.escape(e.id)}"][data-k="${k}"]`)?.value;
      e.type = get("type") || e.type;
      e.niveau = get("niveau") || e.niveau;
      e.titre = get("titre") || e.titre;
      e.texteId = get("texteId") || e.texteId;
      e.consigne = get("consigne") || e.consigne;
      e.prompt = get("prompt") || e.prompt;
      e.explain = get("explain") || e.explain;

      if(e.type==="mcq"){
        const opts = get("options") || "";
        e.options = opts.split("\n").map(s=>s.trim()).filter(Boolean);
        e.answerIndex = Number(get("answerIndex") ?? e.answerIndex);
      }
      if(e.type==="select_in_text"){
        const exp = get("expectedSelections") || "";
        e.expectedSelections = exp.split("\n").map(s=>s.trim()).filter(Boolean);
      }
      if(e.type==="copy"){
        e.expected = get("expected") || e.expected || "";
      }
      if(e.type==="rebuild"){
        const pcs = get("pieces") || "";
        e.pieces = pcs.split("\n").map(s=>s.trim()).filter(Boolean);
        e.expected = get("expected") || e.expected || "";
      }
      if(e.type==="cloze"){
        // blanks au format : id|hint|regex1,regex2
        const braw = get("blanks") || "";
        e.blanks = braw.split("\n").map(line=>line.trim()).filter(Boolean).map(line=>{
          const [bid,hint,regs] = line.split("|");
          const accept = (regs||"").split(",").map(r=>r.trim()).filter(Boolean).map(r=>{
            try{ return new RegExp(r,"i"); } catch { return /$^/; }
          });
          return { id:(bid||"b").trim(), hint:(hint||"").trim(), accept };
        });
      }
      if(e.type==="free_write"){
        // rubric: minSentences, mustHaveQuestion, mustHaveAdj, mustHaveDeGN, keywords (1 par ligne)
        e.rubric = e.rubric || {};
        e.rubric.minSentences = Number(get("minSentences") || e.rubric.minSentences || 3);
        e.rubric.mustHaveQuestion = (get("mustHaveQuestion") === "true");
        e.rubric.mustHaveAdj = (get("mustHaveAdj") === "true");
        e.rubric.mustHaveDeGN = (get("mustHaveDeGN") === "true");
        const kw = get("keywords") || "";
        e.rubric.keywords = kw.split("\n").map(s=>s.trim()).filter(Boolean);
      }
    });

    saveData(DATA);
    // Met à jour l’ordre
    ORDER = DATA.exos.map(e=>e.id);
    alert("Enregistré.");
    render();
  });

  document.getElementById("exitProf").addEventListener("click", ()=>{
    MODE="eleve"; render();
  });

  // Delete exo
  document.querySelectorAll("[data-delexo]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const id = btn.getAttribute("data-delexo");
      if(!confirm("Supprimer cet exercice ?")) return;
      DATA.exos = DATA.exos.filter(e=>e.id!==id);
      saveData(DATA);
      ORDER = DATA.exos.map(e=>e.id);
      PROG.idx = Math.min(PROG.idx, ORDER.length-1);
      saveProgress(PROG);
      render();
    });
  });
}

              <label class="muted small">Interrogative ?</label>

                <option value="false" ${(r.mustHaveQuestion?"" :"selected")}>false</option>
                <option value="true" ${(r.mustHaveQuestion?"selected":"")}>true</option>
              </select>
            </div>
            <div>
              <label class="muted small">“de + GN” ?</label>
              <select data-exo="${e.id}" data-k="mustHaveDeGN">
                <option value="false" ${(r.mustHaveDeGN?"" :"selected")}>false</option>
                <option value="true" ${(r.mustHaveDeGN?"selected":"")}>true</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <div style="height:8px"></div>
      <label class="muted small">Vérif adjectif (true/false) – indicateur approximatif</label>
      <select data-exo="${e.id}" data-k="mustHaveAdj">
        <option value="false" ${(r.mustHaveAdj?"" :"selected")}>false</option>
        <option value="true" ${(r.mustHaveAdj?"selected":"")}>true</option>
      </select>

      <div style="height:8px"></div>
      <label class="muted small">Mots-clés attendus (1 par ligne) – facultatif</label>
      <textarea data-exo="${e.id}" data-k="keywords">${escapeHTML((r.keywords||[]).join("\n"))}</textarea>
    `;
  }

  return common + specific + `</div>`;
}

/* =========================================================
   6) EXPORT / RESET / SHUFFLE
   ========================================================= */
document.getElementById("btnRestart").addEventListener("click", ()=>{
  if(!confirm("Recommencer l’évaluation ?")) return;
  PROG = { startedAt: nowISO(), idx:0, answers:{}, log:[] };
  saveProgress(PROG);
  render();
});

document.getElementById("btnClear").addEventListener("click", ()=>{
  if(!confirm("Effacer la sauvegarde (données + progrès) ?")) return;
  localStorage.removeItem(LS_KEY);
  localStorage.removeItem(LS_PROGRESS);
  DATA = deepClone(DEFAULT_DATA);
  PROG = { startedAt: nowISO(), idx:0, answers:{}, log:[] };
  ORDER = DATA.exos.map(e=>e.id);
  render();
});

document.getElementById("btnExport").addEventListener("click", ()=>{
  const s = computeScore();
  const lines = [];
  lines.push("BILAN – Français 6e");
  lines.push(`Session : ${new Date(PROG.startedAt).toLocaleString()}`);
  lines.push(`Score : ${s.points}/${s.maxPoints} (${Math.round((s.points/s.maxPoints)*100)}%)`);
  lines.push("—");
  for(const id of ORDER){
    const exo = getExoById(id);
    const a = PROG.answers[id];
    if(!exo) continue;
    lines.push(`${a?.ok ? "OK" : "FAUX"} • ${exo.titre} (${exo.type})`);
    lines.push(`Réponse : ${formatAnswer(a?.value)}`);
    lines.push(`Commentaire : ${a?.message || ""}`);
    lines.push("—");
  }
  const txt = lines.join("\n");
  // copie presse-papier si possible
  navigator.clipboard?.writeText(txt).then(()=>alert("Bilan copié dans le presse-papier !"))
    .catch(()=>{ prompt("Copie ce bilan :", txt); });
});

/* =========================================================
   7) HELPERS
   ========================================================= */
function escapeHTML(str){
  return (str||"").replace(/[&<>"']/g, m => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[m]));
}

function diffScore(a,b){
  // score grossier : découpe en tokens et compte différences
  const A = a.split(" ");
  const B = b.split(" ");
  const n = Math.max(A.length,B.length);
  let d = 0;
  for(let i=0;i<n;i++){
    if((A[i]||"") !== (B[i]||"")) d++;
  }
  return d;
}

function formatAnswer(v){
  if(v==null) return "";
  if(typeof v==="string") return v.replace(/\n/g," ").trim();
  if(typeof v==="number") return String(v);
  if(Array.isArray(v)) return v.join(", ");
  if(typeof v==="object") return JSON.stringify(v);
  return String(v);
}

function tokenizeForSelection(text){
  // Retourne une liste de tokens {t,isSpace}
  // On garde les espaces séparés pour conserver la forme.
  const out = [];
  const re = /(\s+|[^\s]+)/g;
  let m;
  while((m = re.exec(text||""))){
    const tok = m[0];
    out.push({ t: tok, isSpace: /^\s+$/.test(tok) });
  }
  return out;
}

/* =========================================================
   8) INITIALISATION + SHUFFLE
   ========================================================= */
ORDER = DATA.exos.map(e=>e.id);

render();

// Mélanger l'ordre des exos (optionnel) : double clic sur la pastille (petit easter egg)
document.getElementById("pill").addEventListener("dblclick", ()=>{
  if(!confirm("Mélanger l'ordre des exercices ?")) return;
  ORDER = shuffle(ORDER);
  PROG.idx = 0;
  saveProgress(PROG);
  render();
});
</script>
